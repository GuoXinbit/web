<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <title>后台 - Hacker666 Tools</title>
    <link rel="preload" href="./styles.css?v=20260514-8" as="style" />
    <link rel="stylesheet" href="./styles.css?v=20260514-8" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-login" data-login-panel>
        <a class="back-link" href="./">Hacker666 Tools</a>
        <p class="eyebrow">Private Admin</p>
        <h1>后台统计</h1>
        <form class="login-form" data-login-form>
          <label>
            <span>后台密码</span>
            <input
              type="password"
              name="password"
              autocomplete="current-password"
              required
              data-password
            />
          </label>
          <button class="primary-button" type="submit">进入后台</button>
          <p class="form-message" data-login-message></p>
        </form>
      </section>

      <section class="admin-dashboard is-hidden" data-dashboard>
        <header class="admin-header">
          <div>
            <a class="back-link" href="./">Hacker666 Tools</a>
            <p class="eyebrow">Traffic</p>
            <h1>访问统计</h1>
          </div>
          <button class="secondary-button" type="button" data-refresh>刷新</button>
        </header>

        <section class="stat-grid" aria-label="统计概览">
          <article>
            <span>总访问</span>
            <strong data-total>--</strong>
          </article>
          <article>
            <span>今日访问</span>
            <strong data-today>--</strong>
          </article>
          <article>
            <span>独立 IP</span>
            <strong data-ips>--</strong>
          </article>
        </section>

        <section class="table-wrap" aria-label="最近访问">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>IP</th>
                <th>页面</th>
                <th>设备</th>
                <th>来源</th>
              </tr>
            </thead>
            <tbody data-events>
              <tr>
                <td colspan="5">正在加载...</td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="admin-section">
          <div class="section-heading compact">
            <p class="eyebrow">Audio</p>
            <h2>录音文件</h2>
          </div>
          <div class="audio-player-panel is-hidden" data-player-panel>
            <div>
              <span class="label">当前播放</span>
              <strong data-player-title>未选择录音</strong>
            </div>
            <audio controls data-audio-player></audio>
          </div>
          <div class="table-wrap" aria-label="录音文件">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>IP</th>
                  <th>时长</th>
                  <th>大小</th>
                  <th>播放</th>
                  <th>下载</th>
                </tr>
              </thead>
              <tbody data-recordings>
                <tr>
                  <td colspan="6">正在加载...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="admin-section">
          <div class="section-heading compact">
            <p class="eyebrow">English</p>
            <h2>英语学习记录</h2>
          </div>
          <div class="table-wrap" aria-label="英语学习记录">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>类型</th>
                  <th>进度</th>
                  <th>不熟词</th>
                  <th>标题 / 状态</th>
                  <th>错误</th>
                </tr>
              </thead>
              <tbody data-english-records>
                <tr>
                  <td colspan="6">正在加载...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="admin-section">
          <div class="section-heading compact">
            <p class="eyebrow">Errors</p>
            <h2>错误记录</h2>
          </div>
          <div class="table-wrap" aria-label="错误记录">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>级别</th>
                  <th>来源</th>
                  <th>页面</th>
                  <th>消息</th>
                  <th>邮件</th>
                </tr>
              </thead>
              <tbody data-errors>
                <tr>
                  <td colspan="6">正在加载...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="./admin.js?v=20260514-8" defer></script>
    <script src="./register-sw.js?v=20260514-8" defer></script>
  </body>
</html>
