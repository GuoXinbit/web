<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <title>后台 - Hacker666 Tools</title>
    <link rel="preload" href="./styles.css?v=20260515-1" as="style" />
    <link rel="stylesheet" href="./styles.css?v=20260515-1" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-login" data-login-panel>
        <a class="back-link" href="./">Hacker666 Tools</a>
        <p class="eyebrow">Private Admin</p>
        <h1>后台统计</h1>
        <form class="login-form" data-login-form>
          <label>
            <span>后台密码</span>
            <input
              type="password"
              name="password"
              autocomplete="current-password"
              required
              data-password
            />
          </label>
          <button class="primary-button" type="submit">进入后台</button>
          <p class="form-message" data-login-message></p>
        </form>
      </section>

      <section class="admin-dashboard is-hidden" data-dashboard>
        <header class="admin-header">
          <div>
            <a class="back-link" href="./">Hacker666 Tools</a>
            <p class="eyebrow">Traffic</p>
            <h1>访问统计</h1>
          </div>
          <button class="secondary-button" type="button" data-refresh>刷新</button>
        </header>

        <section class="stat-grid" aria-label="统计概览">
          <article>
            <span>总访问</span>
            <strong data-total>--</strong>
          </article>
          <article>
            <span>今日访问</span>
            <strong data-today>--</strong>
          </article>
          <article>
            <span>独立 IP</span>
            <strong data-ips>--</strong>
          </article>
        </section>

        <section class="admin-section config-panel">
          <div class="section-heading compact">
            <p class="eyebrow">Settings</p>
            <h2>网站配置中心</h2>
          </div>
          <div class="config-grid">
            <form class="config-form" data-config-form>
              <label>
                <span>DeepSeek Base URL</span>
                <input name="deepseekBaseUrl" type="url" placeholder="https://api.deepseek.com" />
              </label>
              <label>
                <span>DeepSeek API Token（留空表示不修改）</span>
                <input name="deepseekApiKey" type="password" autocomplete="new-password" placeholder="当前密钥不会明文显示" />
              </label>
              <label>
                <span>快速模型</span>
                <input name="deepseekFastModel" type="text" placeholder="deepseek-v4-flash" />
              </label>
              <label>
                <span>标准/思考规划模型</span>
                <input name="deepseekStandardModel" type="text" placeholder="deepseek-v4-pro" />
              </label>
              <label>
                <span>??????</span>
                <input name="deepseekThinkingModel" type="text" placeholder="deepseek-v4-pro" />
              </label>
              <label>
                <span>最终文章模型</span>
                <input name="deepseekFinalModel" type="text" placeholder="deepseek-v4-flash" />
              </label>
              <label>
                <span>翻译模型</span>
                <input name="deepseekTranslateModel" type="text" placeholder="deepseek-v4-flash" />
              </label>
              <label>
                <span>Resend API Key（留空表示不修改）</span>
                <input name="resendApiKey" type="password" autocomplete="new-password" placeholder="当前密钥不会明文显示" />
              </label>
              <label>
                <span>报错发件邮箱</span>
                <input name="errorAlertFrom" type="email" placeholder="alerts@mail.hacker666.com" />
              </label>
              <label>
                <span>报错收件邮箱</span>
                <input name="errorAlertTo" type="text" placeholder="2283159287@qq.com" />
              </label>
              <div class="config-actions">
                <button class="primary-button" type="submit">保存配置</button>
                <button class="secondary-button" type="button" data-check-balance>查询 DeepSeek 余额</button>
              </div>
              <p class="form-message" data-config-message></p>
            </form>
            <aside class="config-summary" data-config-summary>
              <span class="muted-text">正在读取配置...</span>
            </aside>
          </div>
        </section>

        <section class="table-wrap" aria-label="最近访问">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>IP</th>
                <th>页面</th>
                <th>设备</th>
                <th>来源</th>
              </tr>
            </thead>
            <tbody data-events>
              <tr>
                <td colspan="5">正在加载...</td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="admin-section">
          <div class="section-heading compact">
            <p class="eyebrow">Audio</p>
            <h2>录音文件</h2>
          </div>
          <div class="audio-player-panel is-hidden" data-player-panel>
            <div>
              <span class="label">当前播放</span>
              <strong data-player-title>未选择录音</strong>
            </div>
            <audio controls data-audio-player></audio>
          </div>
          <div class="table-wrap" aria-label="录音文件">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>IP</th>
                  <th>时长</th>
                  <th>大小</th>
                  <th>播放</th>
                  <th>下载</th>
                </tr>
              </thead>
              <tbody data-recordings>
                <tr>
                  <td colspan="6">正在加载...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="admin-section">
          <div class="section-heading compact">
            <p class="eyebrow">English</p>
            <h2>英语学习记录</h2>
          </div>
          <div class="table-wrap" aria-label="英语学习记录">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>类型</th>
                  <th>进度</th>
                  <th>不熟词</th>
                  <th>标题 / 状态</th>
                  <th>Token</th>
                  <th>错误</th>
                </tr>
              </thead>
              <tbody data-english-records>
                <tr>
                  <td colspan="7">正在加载...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="admin-section">
          <div class="section-heading compact">
            <p class="eyebrow">Errors</p>
            <h2>错误记录</h2>
          </div>
          <div class="table-wrap" aria-label="错误记录">
            <table>
              <thead>
                <tr>
                  <th>时间</th>
                  <th>级别</th>
                  <th>来源</th>
                  <th>页面</th>
                  <th>消息</th>
                  <th>邮件</th>
                </tr>
              </thead>
              <tbody data-errors>
                <tr>
                  <td colspan="6">正在加载...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="./admin.js?v=20260515-1" defer></script>
    <script src="./register-sw.js?v=20260515-1" defer></script>
  </body>
</html>
